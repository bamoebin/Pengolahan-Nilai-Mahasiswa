/*
 * This file was generated by the Gradle 'init' task.
 *
 * This generated file contains a sample Java application project to get you started.
 * For more details on building Java & JVM projects, please refer to https://docs.gradle.org/9.2.0/userguide/building_java_projects.html in the Gradle documentation.
 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'com.pengolahannilaimhs.Main'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()

    // Mengatur log di terminal
    testLogging {
        // Akan mencetak nama test case yang passed, skipped, atau failed secara realtime
        events "passed", "skipped", "failed" 
        showExceptions true
        exceptionFormat "short"
        showCauses true
        showStackTraces true
    }

    // (Opsional) Membuat ringkasan di bagian akhir persis gaya Maven
    afterSuite { desc, result ->
        if (!desc.parent) { // Hanya dieksekusi setelah seluruh suite tes selesai
            println "\n----------------------------------------------------------"
            println "R E S U L T S"
            println "----------------------------------------------------------"
            println "Tests run: ${result.testCount}, Failures: ${result.failedTestCount}, Skipped: ${result.skippedTestCount}"
            println "----------------------------------------------------------"
        }
    }
}
